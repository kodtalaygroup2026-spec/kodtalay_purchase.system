name: Deploy to Vercel Production

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_9wRoghNXHE1ATjlM5jtG6F30
  VERCEL_PROJECT_ID: prj_6DGdvITEiexjOgOAU5h0kWTGFtN2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build project locally (bypasses Vercel remote build cache)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --force --token=${{ secrets.VERCEL_TOKEN }}
